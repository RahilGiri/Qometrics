<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let's Talk | QometricsTech</title>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js" defer></script>
  <script src="assets/js/main.js?v=4" defer></script>
  <script src="assets/js/particles.js" defer></script>
  <style>
    .premium-form-container { max-width: 800px; margin: 0 auto; }
    .form-group { margin-bottom: 2rem; position: relative; }
    .form-input { width: 100%; padding: 1.5rem 1rem 0.5rem; background: transparent; border: none; border-bottom: 2px solid var(--color-border-glass); color: var(--color-text-main); font-size: 1.2rem; outline: none; transition: var(--transition-fast); }
    .form-input:focus { border-bottom-color: var(--color-neon-green); }
    .form-label { position: absolute; top: 1rem; left: 1rem; color: var(--color-text-muted); font-size: 1.1rem; transition: var(--transition-fast); pointer-events: none; }
    .form-input:focus ~ .form-label, .form-input:not(:placeholder-shown) ~ .form-label { top: -10px; left: 0; font-size: 0.8rem; color: var(--color-neon-green); }
    .premium-btn { width: 100%; padding: 1.5rem; font-size: 1.2rem; background: var(--color-neon-green); color: var(--color-bg-deep); border: none; border-radius: var(--radius-sm); font-weight: bold; cursor: pointer; transition: var(--transition-fast); }
    .premium-btn:hover { background: #fff; box-shadow: var(--shadow-neon); }
  </style>
</head>
<body>
  <div id="tsparticles"></div>
  <qometrics-header></qometrics-header>

  <section style="padding-top: 150px; min-height: 100vh;">
    <div class="container">
      <div class="premium-form-container glass-card reveal stagger-1" style="padding: 4rem;">
        <h1 style="font-size: 3rem; margin-bottom: 1rem; text-align: center;">Book a <span class="text-neon">Discovery Call</span></h1>
        <p class="text-muted" style="text-align: center; margin-bottom: 2rem; font-size: 1.2rem;">Tell us about your vision. Let's architect the future together.</p>

        <!-- Trust Badges -->
        <div style="display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 3rem; opacity: 0.8;">
          <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-family: var(--font-code); color: var(--color-neon-green);">
            <span></span> ISO 27001 Certified
          </div>
          <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-family: var(--font-code); color: var(--color-neon-green);">
            <span></span> SOC2 Compliant
          </div>
          <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; font-family: var(--font-code); color: var(--color-neon-green);">
            <span></span> HIPAA Ready
          </div>
        </div>

        <form id="gas-form">
          <div class="grid-2">
            <div class="form-group">
              <input type="text" id="name" name="name" class="form-input" placeholder=" " required>
              <label for="name" class="form-label">Full Name</label>
            </div>
            <div class="form-group">
              <input type="email" id="email" name="email" class="form-input" placeholder=" " required>
              <label for="email" class="form-label">Corporate Email</label>
            </div>
            
            <div class="form-group">
              <input type="tel" id="phone" name="phone" class="form-input" placeholder=" " required>
              <label for="phone" class="form-label">Phone Number</label>
            </div>
            <div class="form-group">
              <select id="type" name="project_type" class="form-input" required>
                <option value="" disabled selected></option>
                <option value="enterprise">Enterprise Software</option>
                <option value="ai">AI / Machine Learning</option>
                <option value="cloud">Cloud Engineering</option>
                <option value="saas">SaaS Development</option>
              </select>
              <label for="type" class="form-label" style="top: -10px; left: 0; font-size: 0.8rem; color: var(--color-text-muted);">Project Type</label>
            </div>
            
            <div class="form-group">
              <select id="budget" name="budget" class="form-input" required>
                <option value="" disabled selected></option>
                <option value="50-100k">$50k - $100k</option>
                <option value="100-250k">$100k - $250k</option>
                <option value="250-500k">$250k - $500k</option>
                <option value="500k+">$500k+</option>
              </select>
              <label for="budget" class="form-label" style="top: -10px; left: 0; font-size: 0.8rem; color: var(--color-text-muted);">Estimated Budget</label>
            </div>
            <div class="form-group">
              <select id="timeline" name="timeline" class="form-input" required>
                <option value="" disabled selected></option>
                <option value="immediate">Immediate Start</option>
                <option value="1-3">1 - 3 Months</option>
                <option value="3-6">3 - 6 Months</option>
                <option value="flexible">Flexible</option>
              </select>
              <label for="timeline" class="form-label" style="top: -10px; left: 0; font-size: 0.8rem; color: var(--color-text-muted);">Timeline</label>
            </div>
          </div>

          <div class="form-group">
            <textarea id="reqs" name="message" class="form-input" style="min-height: 100px; resize: none;" placeholder=" " required></textarea>
            <label for="reqs" class="form-label">High-Level Requirements</label>
          </div>

          <button type="submit" class="premium-btn" style="margin-top: 1rem;">Schedule Meeting &rarr;</button>
        </form>
      </div>
    </div>
  </section>

  <qometrics-footer></qometrics-footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('gas-form');
      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const submitBtn = form.querySelector('button[type="submit"]');
          const originalText = submitBtn ? submitBtn.innerText : 'Submit';
          if (submitBtn) {
            submitBtn.innerText = 'Submitting...';
            submitBtn.disabled = true;
          }

          // Merge custom fields into the message so Apps Script receives it cleanly
          const rawFormData = new FormData(form);
          const customMessage = `
Project Type: ${rawFormData.get('project_type') || 'N/A'}
Budget: ${rawFormData.get('budget') || 'N/A'}
Timeline: ${rawFormData.get('timeline') || 'N/A'}

Requirements:
${rawFormData.get('message') || ''}
          `.trim();

          const sendData = new URLSearchParams();
          sendData.append('name', rawFormData.get('name') || '');
          sendData.append('email', rawFormData.get('email') || '');
          sendData.append('phone', rawFormData.get('phone') || '');
          sendData.append('resume', ''); // Not applicable for sales
          sendData.append('role_applied_for', 'Client Inquiry');
          sendData.append('message', customMessage);

          try {
            await fetch(
              'https://script.google.com/macros/s/AKfycbwT9b3C0wn_MMbFM2UKWo_DAotQkGYYsGx2ZHPgl80RSaRK53U2FfITEsaIKafOAaSl/exec',
              {
                method: 'POST',
                body: sendData,
                mode: 'no-cors'
              }
            );
            window.location.href = '/thankyouforapplying';
          } catch (error) {
            console.error(error);
            alert('Something went wrong. Please try again.');
            if (submitBtn) { submitBtn.innerText = originalText; submitBtn.disabled = false; }
          }
        });
      }
    });
  </script>

</body>
</html>
