<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | QometricsTech</title>
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/animations.css">
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js" defer></script>
  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/particles.js" defer></script>
  <style>
    .filter-btn { background: transparent; border: 1px solid var(--color-border-glass); color: var(--color-text-muted); padding: 0.5rem 1.5rem; border-radius: var(--radius-pill); cursor: none; transition: var(--transition-fast); }
    .filter-btn:hover, .filter-btn.active { background: var(--color-neon-green-dim); color: var(--color-neon-green); border-color: var(--color-neon-green); }
    .portfolio-img { width: 100%; height: 200px; background: #1a1a1a; border-radius: var(--radius-md); margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #333; }
  </style>
</head>
<body>
  <div id="tsparticles"></div>
  <qometrics-header></qometrics-header>

  <section style="padding-top: 150px;">
    <div class="container">
      <div class="reveal" style="text-align: center; margin-bottom: 4rem;">
        <h1 style="font-size: 3rem; margin-bottom: 1rem;">Our <span class="gradient-text">Portfolio</span></h1>
        <p class="text-muted" style="max-width: 600px; margin: 0 auto;">Explore our latest shipped products, digital transformations, and engineering marvels.</p>
      </div>

      <div class="reveal" style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem;">
        <button class="filter-btn active" data-filter="all">All Projects</button>
        <button class="filter-btn" data-filter="web">Web Apps</button>
        <button class="filter-btn" data-filter="mobile">Mobile Apps</button>
        <button class="filter-btn" data-filter="ai">AI Projects</button>
        <button class="filter-btn" data-filter="enterprise">Enterprise Software</button>
        <button class="filter-btn" data-filter="saas">SaaS Platforms</button>
      </div>

      <div class="grid-3" id="portfolio-grid">
        <!-- Will be populated by JS -->
      </div>
    </div>
  </section>

  <qometrics-footer></qometrics-footer>

  <script>
    const portfolioData = [
    {
      id: 1,
      title: "GlobalNet Logistics OS",
      category: "web",
      tech: "React, Node.js, Kubernetes",
      feature: "Real-time IoT fleet tracking & AI routing.",
      outcome: "Reduced operational costs by $2.4M annually and improved delivery times by 18%.",
      image: "https://images.unsplash.com/photo-1494412519320-aa613dfb7738?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: 2,
      title: "AcmeCorp FinTech App",
      category: "app",
      tech: "React Native, Go, AWS",
      feature: "Secure crypto trading & fiat wallet.",
      outcome: "Scaled to 2M+ active users with zero downtime during peak market volatility.",
      image: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: 3,
      title: "Stark Predictive Maintenance",
      category: "ai",
      tech: "Python, TensorFlow, Azure",
      feature: "Machine learning for factory equipment.",
      outcome: "Decreased factory downtime by 40% and saved $5M in repair costs.",
      image: "https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: 4,
      title: "HealthCore Telemedicine",
      category: "web",
      tech: "Next.js, WebRTC, PostgreSQL",
      feature: "HIPAA-compliant video consults.",
      outcome: "Enabled 100k+ remote patient consultations in the first 6 months.",
      image: "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: 5,
      title: "OmniShop Headless",
      category: "web",
      tech: "Next.js, Shopify Plus, Redis",
      feature: "Sub-second page loads for eCommerce.",
      outcome: "Increased conversion rate by 24% and boosted mobile sales by 30%.",
      image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=800&q=80"
    },
    {
      id: 6,
      title: "Wayne Security Dashboard",
      category: "app",
      tech: "Vue.js, Python, ElasticSearch",
      feature: "Enterprise threat monitoring.",
      outcome: "Detected and mitigated 15,000+ cyber threats automatically.",
      image: "https://images.unsplash.com/photo-1551808525-51a94da548ce?auto=format&fit=crop&w=800&q=80"
    }
  ];

    const grid = document.getElementById('portfolio-grid');
    
    function renderProjects(filter = 'all') {
      grid.innerHTML = '';
      const filtered = filter === 'all' ? portfolioData : portfolioData.filter(p => p.category === filter);
      
      filtered.forEach((p, index) => {
        const card = document.createElement('div');
        card.className = `glass-card reveal active stagger-${(index % 4) + 1}`;
        card.innerHTML = `
          <img src="${p.image}" alt="${p.title}" style="width: 100%; height: 200px; border-radius: var(--radius-md); margin-bottom: 1rem; object-fit: cover; border: 1px solid var(--color-border-glass);">
          <h3 class="text-neon" style="margin-bottom: 0.5rem;">${p.title}</h3>
          <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Tech:</strong> ${p.tech}</p>
          <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.5rem;"><strong>Feature:</strong> ${p.feature}</p>
          <p style="color: var(--color-text-main); font-size: 0.95rem; margin-top: 1rem; border-top: 1px solid var(--color-border-glass); padding-top: 1rem;">
            <strong>Outcome:</strong> ${p.outcome}
          </p>
        `;
        grid.appendChild(card);
      });
    }

    renderProjects();

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderProjects(e.target.dataset.filter);
      });
    });
  </script>
</body>
</html>
